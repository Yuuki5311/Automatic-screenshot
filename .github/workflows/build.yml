name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pyautogui pillow opencv-python-headless numpy selenium webdriver-manager
          pip install pyinstaller

      - name: 打包 exe
        run: |
          pyinstaller --onefile --console --name AutoScreenshot `
            --add-data "templates;templates" `
            --add-data "calibrated_coords.json;." `
            main.py

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: AutoScreenshot-Windows
          path: dist/AutoScreenshot.exe
          retention-days: 90

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AutoScreenshot.exe
          tag_name: nightly
          name: "Nightly Build"
          body: "由 GitHub Actions 自动构建的最新 Windows 版本"
          prerelease: true
