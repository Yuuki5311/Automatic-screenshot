name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包 exe
        run: |
          pyinstaller --onefile --windowed --name AutoScreenshot `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import cv2 `
            --hidden-import cv2._core `
            --collect-all cv2 `
            --hidden-import numpy `
            --hidden-import numpy._core `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --hidden-import selenium `
            --hidden-import selenium.webdriver.chrome.service `
            --hidden-import selenium.webdriver.chrome.options `
            --hidden-import selenium.webdriver.edge.service `
            --hidden-import selenium.webdriver.edge.options `
            --collect-all selenium `
            --collect-binaries selenium `
            --hidden-import webdriver_manager `
            --hidden-import webdriver_manager.chrome `
            --hidden-import webdriver_manager.core.os_manager `
            --hidden-import urllib3 `
            --hidden-import requests `
            --hidden-import certifi `
            --add-data "templates;templates" `
            --add-data "calibrated_coords.json;." `
            main.py

      - name: 验证构建产物
        run: |
          if (-not (Test-Path "dist/AutoScreenshot.exe")) {
            throw "未生成 dist/AutoScreenshot.exe"
          }

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: AutoScreenshot-Windows
          path: dist/AutoScreenshot.exe
          retention-days: 90

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AutoScreenshot.exe
          tag_name: nightly
          name: "Nightly Build"
          body: "由 GitHub Actions 自动构建的最新 Windows 版本"
          prerelease: true
